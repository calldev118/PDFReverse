<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — PrintGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --font: 'Inter', -apple-system, sans-serif;
            --primary: #4f46e5;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #fff;
            --text: #0f172a;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
        }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }
        .login-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
            padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.06);
        }
        .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
        .login-card p.sub { color: var(--text-muted); font-size: .88rem; text-align: center; margin-bottom: 28px; }
        .logo { text-align: center; margin-bottom: 20px; color: var(--primary); }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: .78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .field input {
            width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
            font-size: .92rem; font-family: var(--font); color: var(--text); background: var(--bg);
            transition: border-color .15s, box-shadow .15s;
        }
        .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .btn {
            display: block; width: 100%; padding: 13px; background: var(--primary); color: #fff;
            border: none; border-radius: 10px; font-size: .92rem; font-weight: 600;
            font-family: var(--font); cursor: pointer; transition: background .15s, transform .1s;
        }
        .btn:hover { background: #4338ca; transform: translateY(-1px); }
        .error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-bottom: 18px; text-align: center; }
        .back-link { text-align: center; margin-top: 18px; }
        .back-link a { color: var(--text-muted); font-size: .82rem; text-decoration: none; }
        .back-link a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1>Admin Access</h1>
        <p class="sub">PrintGrid Control Panel</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="back-link"><a href="/">&larr; Back to PrintGrid</a></div>
    </div>
</body>
</html>
